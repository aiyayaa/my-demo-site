<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentation 展示首页</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Presentation 展示首页</h1>
      <p>用于集中展示各类汇报网页、PPT 风格 HTML 页面和技术说明页面。</p>
    </div>
  </header>

  <main class="container">
    <section class="section-title">
      <h2>汇报列表</h2>
      <p>点击下面条目进入对应展示页面。</p>
    </section>

    <section id="slide-list" class="card-grid"></section>
  </main>

  <footer class="site-footer">
    <span>Hosted by GitHub Pages</span>
  </footer>

  <script>
    async function loadSlides() {
      const list = document.getElementById("slide-list");

      try {
        const response = await fetch("./slides.json");
        const slides = await response.json();

        list.innerHTML = slides.map(item => `
          <a class="card" href="${item.path}">
            <div class="card-date">${item.date || ""}</div>
            <h3>${item.title}</h3>
            <p>${item.description || ""}</p>
            <span class="card-link">进入查看 →</span>
          </a>
        `).join("");
      } catch (error) {
        list.innerHTML = `
          <div class="empty">
            <strong>汇报列表加载失败。</strong>
            <p>请检查 slides.json 是否存在，格式是否正确。</p>
          </div>
        `;
        console.error(error);
      }
    }

    loadSlides();
  </script>
</body>
</html>
